{% extends "shop/base.html" %}

{% block extra_css %}
<style>
    .monitor-shell { max-width: 1280px; margin: 36px auto; padding: 0 20px 48px; }
    .monitor-hero { display: flex; justify-content: space-between; gap: 24px; align-items: end; margin-bottom: 24px; }
    .monitor-title h1 { margin: 0; font-size: 34px; }
    .monitor-title p { margin: 8px 0 0; color: var(--text-light); max-width: 760px; }
    .monitor-nav, .section-tabs, .inline-meta { display: flex; gap: 10px; flex-wrap: wrap; }
    .monitor-nav { margin-bottom: 24px; }
    .monitor-nav a, .section-tabs a {
        text-decoration: none; color: var(--text-dark); background: rgba(255,255,255,.45);
        border: 1px solid var(--border-color); border-radius: 999px; padding: 10px 16px; font-weight: 600;
    }
    .section-tabs { margin-bottom: 20px; }
    .section-tabs a.is-active { background: var(--card-header); }
    .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .split-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 18px; }
    .metric-card, .panel {
        background: rgba(255,255,255,.55); border: 1px solid var(--border-color); border-radius: var(--radius);
        box-shadow: var(--shadow);
    }
    .metric-card { padding: 18px; }
    .metric-card .label { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-light); }
    .metric-card .value { font-size: 28px; font-weight: 700; margin-top: 8px; }
    .metric-card .subvalue { color: var(--text-light); font-size: 14px; margin-top: 6px; }
    .panel { overflow: hidden; }
    .panel-header { padding: 16px 20px; border-bottom: 1px solid var(--border-color); background: rgba(76,224,177,.28); }
    .panel-header h2, .panel-header h3 { margin: 0; font-size: 18px; }
    .panel-header p { margin: 6px 0 0; color: var(--text-light); font-size: 14px; }
    .panel-body { padding: 18px 20px 22px; }
    .severity-pill, .status-pill {
        display: inline-flex; align-items: center; border-radius: 999px; padding: 6px 10px;
        font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
    }
    .severity-high, .status-failed { background: #ffd4cc; color: #8b2f1c; }
    .severity-medium, .status-degraded { background: #ffeab8; color: #8b6400; }
    .severity-low, .status-completed { background: #d2f7e9; color: #17644a; }
    .status-skipped { background: #e6eef2; color: #4b5f6c; }
    .summary-list, .detail-list { list-style: none; margin: 0; padding: 0; display: grid; gap: 12px; }
    .summary-list li, .detail-list li {
        padding: 14px 16px; border: 1px solid var(--border-color); border-radius: 12px; background: rgba(255,255,255,.45);
    }
    .key-value { display: grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }
    .key-value div, .compare-form label { display: grid; gap: 4px; }
    .compare-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; align-items: end; margin-bottom: 24px; }
    .compare-form select {
        padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border-color); background: rgba(255,255,255,.8);
    }
    .button-link {
        display: inline-block; padding: 12px 18px; border-radius: 10px; border: 0; text-decoration: none;
        background: var(--primary-color); color: white; font-weight: 700;
    }
    .bar-chart, .paired-chart { display: grid; gap: 12px; margin: 0; padding: 0; list-style: none; }
    .bar-chart li, .paired-chart li {
        display: grid; gap: 8px; padding: 12px 14px; border: 1px solid var(--border-color);
        border-radius: 12px; background: rgba(255,255,255,.4);
    }
    .chart-label { display: flex; justify-content: space-between; gap: 12px; font-weight: 600; }
    .chart-meta { color: var(--text-light); font-size: 13px; }
    .chart-scale {
        display: flex; justify-content: space-between; gap: 12px; color: var(--text-light);
        font-size: 12px; font-weight: 600; letter-spacing: .02em;
    }
    .bar-track {
        height: 12px; border-radius: 999px; background: rgba(45, 52, 54, 0.08); overflow: hidden;
    }
    .bar-fill {
        height: 100%; border-radius: 999px; background: linear-gradient(90deg, #15803d, #22c55e);
    }
    .paired-bars { display: grid; gap: 10px; }
    .paired-row {
        display: grid; grid-template-columns: 76px minmax(0, 1fr) auto; gap: 12px; align-items: center;
    }
    .paired-row-label {
        color: var(--text-light); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
    }
    .paired-bar-value {
        min-width: 82px; text-align: right; font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums;
    }
    .paired-bar-labels { display: flex; gap: 14px; color: var(--text-light); font-size: 12px; font-weight: 600; }
    .paired-track {
        position: relative; height: 18px; border-radius: 999px; overflow: hidden;
        background:
            linear-gradient(90deg, rgba(15, 23, 42, 0.08), rgba(15, 23, 42, 0.12)),
            repeating-linear-gradient(
                90deg,
                rgba(15, 23, 42, 0.02) 0,
                rgba(15, 23, 42, 0.02) calc(12.5% - 1px),
                rgba(15, 23, 42, 0.14) calc(12.5% - 1px),
                rgba(15, 23, 42, 0.14) 12.5%
            );
        box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.08);
    }
    .paired-track::after {
        content: ""; position: absolute; inset: 0 auto 0 calc(100% - 2px); width: 2px; background: rgba(15, 23, 42, 0.2);
    }
    .paired-fill {
        height: 100%; border-radius: 999px; min-width: 6px;
        box-shadow: 0 8px 16px rgba(15, 23, 42, 0.12);
    }
    .paired-gap {
        position: absolute; top: 0; right: 0; bottom: 0;
        background: rgba(255,255,255,0.28);
        border-left: 2px dashed rgba(15, 23, 42, 0.2);
    }
    .paired-ratio {
        color: var(--text-light); font-size: 11px; font-weight: 700; letter-spacing: .04em;
        text-transform: uppercase;
    }
    .comparison-chart {
        display: grid; gap: 10px;
    }
    .comparison-axis {
        position: relative; height: 24px; margin-left: 88px; margin-right: 92px;
    }
    .comparison-axis-line {
        position: absolute; inset: 10px 0 auto 0; height: 2px; background: rgba(15, 23, 42, 0.15);
    }
    .comparison-tick {
        position: absolute; top: 0; transform: translateX(-50%);
        display: grid; justify-items: center; gap: 4px; color: var(--text-light);
        font-size: 11px; font-weight: 700; letter-spacing: .04em;
    }
    .comparison-tick::before {
        content: ""; width: 2px; height: 10px; background: rgba(15, 23, 42, 0.18);
    }
    .comparison-rows {
        display: grid; gap: 12px;
    }
    .comparison-row {
        display: grid; grid-template-columns: 76px minmax(0, 1fr) auto; gap: 12px; align-items: center;
    }
    .comparison-bar-shell {
        position: relative; height: 22px; border-radius: 999px; overflow: hidden;
        background:
            linear-gradient(90deg, rgba(15, 23, 42, 0.08), rgba(15, 23, 42, 0.12)),
            repeating-linear-gradient(
                90deg,
                rgba(15, 23, 42, 0.02) 0,
                rgba(15, 23, 42, 0.02) calc(25% - 1px),
                rgba(15, 23, 42, 0.12) calc(25% - 1px),
                rgba(15, 23, 42, 0.12) 25%
            );
        box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.08);
    }
    .comparison-bar-shell::after {
        content: ""; position: absolute; inset: 0 auto 0 calc(100% - 2px); width: 2px; background: rgba(15, 23, 42, 0.2);
    }
    .comparison-bar {
        position: relative; z-index: 2; height: 100%; min-width: 6px; border-radius: 999px;
        box-shadow: 0 8px 16px rgba(15, 23, 42, 0.12);
    }
    .comparison-gap {
        position: absolute; top: 0; right: 0; bottom: 0;
        background: rgba(255,255,255,0.34);
        border-left: 2px dashed rgba(15, 23, 42, 0.2);
        z-index: 1;
    }
    .comparison-value {
        min-width: 92px; text-align: right; font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums;
    }
    .paired-before { background: linear-gradient(90deg, #94a3b8, #64748b); }
    .paired-after { background: linear-gradient(90deg, #0f766e, #14b8a6); }
    .muted { color: var(--text-light); }
    code { white-space: pre-wrap; }
    @media (max-width: 800px) {
        .monitor-hero { flex-direction: column; align-items: start; }
        .paired-row { grid-template-columns: 1fr; }
        .paired-bar-value { text-align: left; min-width: 0; }
        .comparison-axis { margin-left: 0; margin-right: 0; }
        .comparison-row { grid-template-columns: 1fr; }
        .comparison-value { text-align: left; min-width: 0; }
    }
</style>
{% block monitor_extra_css %}{% endblock %}
{% endblock %}
