<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    
    <!-- Google Fonts dla nowoczesnego wyglądu -->
    <link href="https://fonts.googleapis.com" rel="stylesheet">

    <style>
        /* 1. ZMIENNE SYSTEMOWE - Zmień tutaj, aby zmienić wszędzie */
        :root {
            --primary-color: #6c5ce7;    /* Główny fiolet */
            --primary-hover: #5b4bc4;
            --bg-color: #9edbab;         /* Jasne tło strony */
            --card-header: #4ce0b1;
            --card-bg: #a0f8de;          /* Tło kart i tabel */
            --hover-color: #cdfff1;
            --text-dark: #2d3436;        /* Główny tekst */
            --text-light: #636e72;       /* Tekst pomocniczy/opisy */
            --border-color: #64e0b9;     /* Kolor linii i ramek */
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
            --radius: 12px;              /* Zaokrąglenie wszystkiego */
        }

        /* 2. RESET I BAZA */
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.5;
        }

        /* 3. WSPÓLNE KLASY UKŁADU */
        .page-container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-header {
            margin-bottom: 30px;
        }

        .page-header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
        }

        .page-header p {
            margin: 5px 0 0;
            color: var(--text-light);
        }

        /* 4. UNIWERSALNA KARTA (Dla tabel i list) */
        .content-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        /* 5. UNIWERSALNA TABELA */
        .main-table {
            width: 100%;
            border-collapse: collapse;
        }

        .main-table thead th {
            background: var(--card-header);
            padding: 15px 20px;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-light);
            border-bottom: 2px solid var(--border-color);
            position: sticky;
            top: 0;
        }

        .main-table td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        .main-table tr:hover {
            background-color: var(--hover-color);
        }

        /* Wspólny styl dla przycisków akcji w tabelach */
        .btn-action {
            text-decoration: none;
            color: var(--primary-color);
            font-weight: 600;
            font-size: 13px;
            padding: 6px 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            display: inline-block;
            transition: all 0.2s ease;
        }

        .btn-action:hover {
            background-color: var(--primary-color);
            color: var(--hover-color);
            border-color: var(--primary-color);
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Możesz tu dodać wspólny pasek nawigacji (Navbar) -->

    <main>
        {% block content %}
        <!-- Tu wpadnie treść z innych plików -->
        {% endblock %}
    </main>

    {% block extra_js %}{% endblock %}
</body>
</html>
